<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operation Black Pine</title>
  <link rel="stylesheet" href="./style.css?v=4" />
</head>
<body>
  <div id="game-root">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="top-bar">
        <div class="hud-panel">
          <div class="label">OBJECTIVE</div>
          <div id="objective-text">Infiltrate the compound and plant the charge.</div>
        </div>
        <div class="hud-panel right-compact">
          <div class="mini-stat">
            <span class="label">TIME</span>
            <span id="mission-timer">15:00</span>
          </div>
          <div class="mini-stat">
            <span class="label">ENEMIES</span>
            <span id="enemy-count">0</span>
          </div>
        </div>
      </div>

      <div id="center-ui">
        <div id="crosshair"></div>
        <div id="hitmarker"></div>

        <div id="interact-prompt" class="hidden"></div>

        <div id="progress-wrapper" class="hidden">
          <div id="progress-label">PLANTING</div>
          <div id="progress-bar">
            <div id="progress-fill"></div>
          </div>
        </div>

        <div id="defuse-alert" class="hidden">ENEMY DEFUSING</div>
      </div>

      <div id="bottom-bar">
        <div class="hud-panel player-panel">
          <div class="player-stat">
            <span class="label">HEALTH</span>
            <span id="health-value">100</span>
          </div>
          <div class="player-stat">
            <span class="label">ARMOR</span>
            <span id="armor-value">50</span>
          </div>
          <div class="player-stat">
            <span class="label">WEAPON</span>
            <span id="weapon-name">Rifle</span>
          </div>
          <div class="player-stat">
            <span class="label">AMMO</span>
            <span id="ammo-value">30 / 120</span>
          </div>
        </div>

        <div class="hud-panel right-panel">
          <div id="bomb-status">Charge not planted</div>
          <div id="bomb-timer" class="hidden">00:00</div>
        </div>
      </div>
    </div>

    <div id="damage-vignette"></div>
    <div id="flash-overlay"></div>

    <div id="click-banner">
      Mission loaded. Click inside the game to lock the mouse and begin.
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="menu-card small">
        <h2>Paused</h2>
        <p>Press <strong>Esc</strong> to resume.</p>
        <button id="resume-button">Resume</button>
        <button id="restart-button">Restart</button>
      </div>
    </div>

    <div id="end-overlay" class="overlay hidden">
      <div class="menu-card small">
        <h2 id="end-title">Mission Complete</h2>
        <p id="end-message"></p>
        <button id="end-restart-button">Restart Mission</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js?v=4"></script>
</body>
</html>
